name: Build and Deploy to cPanel branch

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.2.5-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.2.5-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/client/index.html" ]; then
            echo "dist/client/index.html was not generated"
            echo "--- dist tree ---"
            find dist -maxdepth 3 -type f -print 2>/dev/null || true
            exit 1
          fi

      - name: Publish clean build to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist/client
          force_orphan: true
          keep_files: false
          enable_jekyll: false
